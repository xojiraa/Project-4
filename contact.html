<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - Albin Gabrielsson</title>
    <script defer src="script.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://forminit.com/sdk/v1/forminit.js" defer></script>
    <script defer src="form.js"></script>
</head>

<body>

    <div class="container-fluid">

        <header>
            <div class="row align-items-center">
                <div class="col-6 col-lg-6" id="header-name">
                    <h1 class="py-4 ps-0 m-0">Albin Gabrielsson</h1>
                </div>

                <div class="col-6 col-lg-6" id="header-navbar">
                    <nav class="navbar navbar-expand-md navbar-light" aria-label="Huvudmeny">
                        <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse"
                            data-bs-target="#collapsibleNavbar" aria-controls="collapsibleNavbar" aria-expanded="false"
                            aria-label="Visa meny">
                            <span class="navbar-toggler-icon"></span>
                        </button>

                        <div class="collapse navbar-collapse col-md-6" id="collapsibleNavbar">
                            <ul class="navbar-nav">
                                <li class="nav-item"><a class="nav-link" href="index.html" draggable="false">Home</a>
                                </li>
                                <li class="nav-item"><a class="nav-link" href="about.html" draggable="false">About</a>
                                </li>
                                <li class="nav-item"><a class="nav-link" href="contact.html"
                                        draggable="false">Contact</a></li>
                            </ul>
                        </div>
                    </nav>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <hr class="m-0">
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-sm-6" id="main-top">
                    <p class="fs-5 ps-0">Student at NTI</p>
                </div>
                <nav class="col-sm-6 media-links" aria-label="Sociala medier">
                    <ul class="list-unstyled d-flex gap-3 mb-0 justify-content-sm-end">
                        <li><a href="https://github.com/xojiraa" draggable="false">GitHub</a></li>
                        <li><a href="https://www.instagram.com/pewdiepie/" draggable="false">Instagram</a></li>
                        <li><a href="https://www.linkedin.com" draggable="false">LinkedIn</a></li>
                    </ul>
                </nav>
            </div>
            <div class="d-flex justify-content-center mt-3">
                <button class="btn" id="theme-toggle" type="button">Switch theme</button>
            </div>
        </header>

        <main class="container py-5">
            <section id="contact">
                <h2 class="text-center mb-4">Contact me</h2>

                <form id="contact-form" class="row g-3">
                    <div class="col-md-12">
                        <label for="full-name" class="visually-hidden">Full Name</label>
                        <input type="text" id="full-name" class="w-100 p-2" name="fi-sender-fullName" placeholder="Full Name" required />
                    </div>

                    <div class="col-md-6">
                        <label for="phone-input" class="visually-hidden">Phone Number</label>
                        <input type="tel" id="phone-input" class="w-100 p-2" placeholder="+4670-000-00-00" required />
                        <input type="hidden" name="fi-sender-phone" id="hidden-phone">
                    </div>

                    <div class="col-md-6">
                        <label for="email" class="visually-hidden">Email</label>
                        <input type="email" id="email" class="w-100 p-2" name="fi-sender-email" placeholder="Email" required />
                    </div>

                    <div class="col-md-6">
                        <label for="city" class="visually-hidden">City</label>
                        <input type="text" id="city" class="w-100 p-2" name="fi-sender-city" placeholder="City" required />
                    </div>

                    <div class="col-md-6">
                        <label for="address" class="visually-hidden">Address</label>
                        <input type="text" id="address" class="w-100 p-2" name="fi-sender-address" placeholder="Address" required />
                    </div>

                    <div class="col-md-12">
                        <label for="message" class="form-label">Message</label>
                        <textarea id="message" name="fi-text-message" class="w-100 p-2" placeholder="Your message..." rows="5" required></textarea>
                    </div>

                    <div class="col-md-12 d-flex justify-content-center">
                        <button type="submit" class="sendBtn btn btn-primary px-5">Send Message</button>
                    </div>
                </form>

                <p id="form-status" aria-live="polite" class="text-center mt-3"></p>
            </section>
        </main>

        <footer>
            <div class="row mb-5">
                <div class="col-12">
                    <hr>
                    <p class="text-center">&copy; 2026 Albin Gabrielsson productions</p>
                </div>
            </div>
        </footer>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" aria-live="assertive">
        <div id="successToast" class="toast align-items-center text-white bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">Message sent successfully!</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Stäng"></button>
            </div>
        </div>

        <div id="errorToast" class="toast align-items-center text-white bg-danger border-0" role="alert">
            <div class="d-flex">
                <div id="errorToastbody" class="toast-body">An error occurred.</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Stäng"></button>
            </div>
        </div>
    </div>

</body>

</html>
